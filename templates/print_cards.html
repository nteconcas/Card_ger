<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Imprimir Cartões</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Ajustes específicos para impressão em A4 */
        @page {
            size: A4 portrait;
            margin: 15mm;
        }
        
        body {
            background-color: #fff;
            color: #333;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15mm;
            page-break-after: always; /* Garante a quebra de página caso ultrapasse o A4 */
        }

        .badge-card {
            border: 2px solid #333;
            border-radius: 8px;
            padding: 15px;
            height: 85mm; /* Altura padrão para crachá */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-color: #fff;
            box-sizing: border-box;
            page-break-inside: avoid; /* Evita que o cartão seja cortado ao meio */
        }

        .card-header-custom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #ccc;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .card-header-custom img {
            max-height: 40px;
            max-width: 100px;
            object-fit: contain;
        }

        .card-header-custom h3 {
            font-size: 1.1rem;
            font-weight: bold;
            margin: 0;
            color: #0d6efd;
            text-align: right;
        }

        .card-body-custom {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card-body-custom p {
            margin-bottom: 6px;
            font-size: 0.95rem;
        }

        .card-body-custom strong {
            color: #111;
        }

        .no-print {
            margin-top: 20px;
            text-align: center;
        }

        @media print {
            .no-print {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="card-grid">
        {% for u in usuarios %}
        <div class="badge-card">
            <div class="card-header-custom">
                {% if logo_url %}
                <img src="{{ logo_url }}" alt="Logo">
                {% endif %}
                <h3>{{ titulo_cabecalho }}</h3>
            </div>
            <div class="card-body-custom">
                <p class="mb-2"><strong>Matrícula:</strong> {{ u.matricula }}</p>
                <p class="mb-2"><strong>Nome:</strong> {{ u.nome }}</p>
                <p class="mb-0"><strong>Informações:</strong> {{ u.info }}</p>
            </div>
            <div class="text-center text-muted" style="font-size: 0.7rem; border-top: 1px dashed #eee; padding-top: 5px;">
                Documento de uso pessoal e intransferível.
            </div>
        </div>
        {% endfor %}
    </div>

    <div class="no-print">
        <button onclick="window.print()" class="btn btn-success btn-lg">Imprimir / Salvar em PDF</button>
    </div>

</body>
</html>
