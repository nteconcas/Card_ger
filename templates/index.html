<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Cartões de Acesso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">
    <div class="container max-w-lg">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="h4 mb-4 text-center text-primary">Gerador de Cartões de Acesso</h2>
                
                <form action="/gerar" method="POST" target="_blank">
                    <div class="mb-3">
                        <label for="titulo_cabecalho" class="form-label">Título do Cabeçalho</label>
                        <input type="text" class="form-control" id="titulo_cabecalho" name="titulo_cabecalho" value="IDENTIFICAÇÃO DE ACESSO" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="logo_url" class="form-label">URL da Logo (Imagem)</label>
                        <input type="url" class="form-control" id="logo_url" name="logo_url" placeholder="https://exemplo.com/logo.png" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="usuarios" class="form-label">Dados dos Usuários</label>
                        <textarea class="form-control" id="usuarios" name="usuarios" rows="8" placeholder="Matrícula; Nome Completo; Informações&#10;12345; João da Silva; Professor / Setor A&#10;54321; Maria Souza; Aluno / 3º Ano" required></textarea>
                        <div class="form-text">Insira os dados separados por ponto e vírgula <code>;</code>, um por linha.</div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100">Gerar e Imprimir</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
