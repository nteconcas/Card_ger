<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Cartões de Acesso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">
    <div class="container max-w-lg">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="h4 mb-4 text-center text-primary">Gerador de Cartões de Acesso</h2>
                
                <form action="/gerar" method="POST" enctype="multipart/form-data" target="_blank">
                    <div class="mb-3">
                        <label for="titulo_cabecalho" class="form-label">Título do Cabeçalho (Pode conter múltiplas linhas)</label>
                        <textarea class="form-control" id="titulo_cabecalho" name="titulo_cabecalho" rows="2" required>IDENTIFICAÇÃO DE ACESSO</textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label for="logo_url" class="form-label">URL da Logo (Imagem)</label>
                        <input type="url" class="form-control" id="logo_url" name="logo_url" placeholder="https://exemplo.com/logo.png" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="planilha" class="form-label">Planilha de Usuários (.xlsx, .xls)</label>
                        <input type="file" class="form-control" id="planilha" name="planilha" accept=".xlsx, .xls" required>
                        <div class="form-text">Envie uma planilha Excel. As 3 primeiras colunas devem ser: Matrícula, Nome e Informações.</div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100">Gerar e Imprimir</button>
                </form>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const tituloInput = document.getElementById("titulo_cabecalho");
            const logoInput = document.getElementById("logo_url");
            
            // Carregar valores salvos
            if (localStorage.getItem("titulo_cabecalho")) {
                tituloInput.value = localStorage.getItem("titulo_cabecalho");
            }
            if (localStorage.getItem("logo_url")) {
                logoInput.value = localStorage.getItem("logo_url");
            }
            
            // Salvar valores ao alterar
            tituloInput.addEventListener("input", function() {
                localStorage.setItem("titulo_cabecalho", tituloInput.value);
            });
            logoInput.addEventListener("input", function() {
                localStorage.setItem("logo_url", logoInput.value);
            });
        });
    </script>
</body>
</html>
